name: CI Test Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests and capture output
        shell: bash
        run: |
          set -o pipefail
          ./mvnw -B clean test 2>&1 | tee test-output.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task3-test-diagnostics
          path: |
            test-output.log
            target/surefire-reports
          if-no-files-found: warn
          retention-days: 3
