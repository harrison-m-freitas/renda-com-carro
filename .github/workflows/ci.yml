name: CI

on:
  push:
    branches: [main, feature/mvp]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run JavaScript tests
        run: npm run test:js
      - name: Run tests
        run: ./mvnw -B clean test
      - name: Upload Maven reports after failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-reports
          path: target/surefire-reports
          if-no-files-found: warn
          retention-days: 3
      - name: Package application
        run: ./mvnw -B -DskipTests package
      - name: Reject committed credentials
        shell: bash
        run: |
          matches="$(git grep -nEi '(password|secret|token|restic_password)=' -- \
            ':!README.md' \
            ':!docs/**' \
            ':!src/test/**' \
            ':!.github/**' \
            ':!.env.example' \
            ':!infra/backup/restic.env.example' || true)"
          if [[ -n "$matches" ]]; then
            printf '%s\n' "$matches"
            echo 'Potential credential assignment found in versioned production files.' >&2
            exit 1
          fi

  ops-smoke:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Prepare isolated CI environment
        run: |
          cat > .env <<'ENV'
          DB_NAME=renda_com_carro
          DB_USER=renda
          DB_PASSWORD=ci_database_password_change_me
          APP_ADMIN_USERNAME=ci-owner
          APP_ADMIN_PASSWORD=ci-owner-password-with-16-characters
          APP_PORT=8080
          APP_VERSION=ci
          DATA_ROOT=./var
          RESTORE_ROOT=./var/restore-test
          RCLONE_CONFIG_DIR=./var/rclone
          RESTIC_LOCAL_ROOT=./var/restic-local
          TZ=America/Sao_Paulo
          ENV
          cat > infra/backup/restic.env <<'ENV'
          RESTIC_REPOSITORY=/restic/repository
          RESTIC_PASSWORD=ci-restic-password-change-me
          RESTIC_AUTO_INIT=true
          RESTIC_HOST=github-actions
          ENV
          chmod 600 .env infra/backup/restic.env
          mkdir -p var/{storage,logs,backup-work,restore-test/storage,restore-test/config-review,rclone,restic-local}
          sudo chown -R 10001:10001 var/storage var/logs

      - name: Validate shell and Compose configuration
        run: |
          bash -n infra/backup/backup.sh
          bash -n infra/backup/restore.sh
          docker compose config >/tmp/compose.rendered.yaml

      - name: Build ARM64 application image
        run: |
          docker buildx build --quiet \
            --platform linux/arm64 \
            --file Dockerfile \
            --tag renda-com-carro:arm64-ci \
            --output type=oci,dest=/tmp/renda-com-carro-arm64.tar \
            .
          test -s /tmp/renda-com-carro-arm64.tar

      - name: Start production stack
        shell: bash
        run: |
          set +e
          docker compose build --quiet app backup
          BUILD_STATUS=$?
          docker compose up -d --no-build postgres app backup
          UP_STATUS=$?
          set -e

          healthy=false
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8080/actuator/health >/tmp/health.json; then
              cat /tmp/health.json
              healthy=true
              break
            fi
            sleep 5
          done

          {
            echo "build_status=${BUILD_STATUS}"
            echo "up_status=${UP_STATUS}"
            echo "health_reached=${healthy}"
            echo '=== docker compose ps -a ==='
            docker compose ps -a || true
            echo '=== docker inspect states ==='
            for id in $(docker compose ps -aq); do
              docker inspect --format '{{.Name}} status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$id" || true
            done
            echo '=== service logs ==='
            docker compose logs --no-color --tail=250 app postgres backup || true
          } > var/ops-diagnostics.txt 2>&1

          [[ "$BUILD_STATUS" -eq 0 && "$UP_STATUS" -eq 0 && "$healthy" == true ]]

      - name: Exercise backup and isolated restore
        run: |
          printf 'backup smoke test\n' | sudo tee var/storage/smoke.txt >/dev/null
          sudo chown 10001:10001 var/storage/smoke.txt
          docker compose exec -T backup /opt/backup/backup.sh
          docker compose exec -T \
            -e RESTORE_CONFIRMATION=RESTORE \
            -e RESTORE_DATABASE=renda_com_carro_restore_ci \
            -e RESTORE_STORAGE_DIR=/restore/storage \
            -e RESTORE_CONFIG_DIR=/restore/config-review \
            backup /opt/backup/restore.sh latest
          test -f var/restore-test/storage/smoke.txt
          grep -q 'backup smoke test' var/restore-test/storage/smoke.txt
          docker compose exec -T postgres \
            psql -U renda -d renda_com_carro_restore_ci -c '\dt'

      - name: Collect diagnostics
        if: always()
        shell: bash
        run: |
          {
            echo '=== final docker compose ps -a ==='
            docker compose ps -a || true
            echo '=== final service logs ==='
            docker compose logs --no-color --tail=300 app postgres backup || true
          } >> var/ops-diagnostics.txt 2>&1

      - name: Upload diagnostics after failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ops-diagnostics
          path: var/ops-diagnostics.txt
          if-no-files-found: error
          retention-days: 3

      - name: Stop stack
        if: always()
        run: docker compose down --remove-orphans
