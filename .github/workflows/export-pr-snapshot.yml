name: Capture PR Maven diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/export-pr-snapshot.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR 14 head
        uses: actions/checkout@v4
        with:
          ref: 34835b41ebf593ca04dc79c8c50c1c0c718927aa

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Capture Maven output
        shell: bash
        run: |
          set +e
          ./mvnw -B clean test > maven-diagnostics.log 2>&1
          status=$?
          cat maven-diagnostics.log
          echo "$status" > maven-status.txt
          exit 0

      - name: Upload Maven diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: maven-diagnostics
          path: |
            maven-diagnostics.log
            maven-status.txt
          retention-days: 1
