name: Export source snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Create source archive
        run: tar --exclude=.git -czf /tmp/source-snapshot.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: source-snapshot-base
          path: /tmp/source-snapshot.tar.gz
          retention-days: 1
