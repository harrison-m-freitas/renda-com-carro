name: Apply obligation redesign payload

on:
  push:
    branches:
      - feat/obligation-financing-redesign
    paths:
      - '.github/obligation-bootstrap/**'
      - '.github/workflows/obligation-bootstrap.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/obligation-bootstrap/chunk-* | base64 --decode > /tmp/obligation-redesign.tar.gz
          echo "c1e58ae84e1889c882183a38f277a27fb696ef941a59811791df4d22a487b489  /tmp/obligation-redesign.tar.gz" | sha256sum --check -
          tar -xzf /tmp/obligation-redesign.tar.gz
          rm -rf .github/obligation-bootstrap

      - name: Commit applied implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: rebuild obligation financing flow"
          git push origin HEAD:feat/obligation-financing-redesign
