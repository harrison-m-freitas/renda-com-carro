name: PR15 merge main

on:
  push:
    branches:
      - feat/obligation-financing-redesign

permissions:
  contents: write

jobs:
  merge:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feat/obligation-financing-redesign
      - name: Merge main into PR branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-ff origin/main -m 'merge: update PR 15 with main [skip ci]'
          git push origin HEAD:feat/obligation-financing-redesign
