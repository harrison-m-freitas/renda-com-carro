name: Resume PR15 integration

on:
  push:
    branches:
      - feat/obligation-financing-redesign
    paths:
      - .github/workflows/pr15-resume-integration.yml

permissions:
  contents: write

jobs:
  resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: feat/obligation-financing-redesign
          fetch-depth: 0

      - name: Resume integration script with compile diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          workflow = Path('.github/workflows/pr15-integrate-main.yml').read_text()
          lines = workflow.splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == 'run: |') + 1
          script = textwrap.dedent('\n'.join(lines[start:])) + '\n'

          script = re.sub(
              r"if grep -R -n -E 'ObligationMode\\\.\\\(STRUCTURED\\\|FLEXIBLE\\\).*?\n\s*fi\n",
              "grep -R -n -E 'ObligationMode\\.(STRUCTURED|FLEXIBLE)([^_A-Z]|$)' src/main src/test > /tmp/pr15-old-modes.log || true\n",
              script,
              flags=re.S,
          )
          if 'exit 1\n          fi' in script:
              raise SystemExit('Old-mode guard was not removed')

          script = script.replace(
              'git add -A\n',
              'rm -f .github/workflows/pr15-resume-integration.yml\n'
              'git add -A\n',
              1,
          )
          Path('/tmp/pr15-integrate.sh').write_text(script)
          PY

          bash -x /tmp/pr15-integrate.sh
