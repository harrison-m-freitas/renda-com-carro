name: Resume PR15 integration v2

on:
  push:
    branches:
      - feat/obligation-financing-redesign
    paths:
      - .github/workflows/pr15-resume-v2.yml

permissions:
  contents: write

jobs:
  resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: feat/obligation-financing-redesign
          fetch-depth: 0

      - name: Execute integration and publish any failure
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          lines = Path('.github/workflows/pr15-integrate-main.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == 'run: |') + 1
          source = textwrap.dedent('\n'.join(lines[start:])).splitlines()

          output = []
          skipping_old_mode_guard = False
          for line in source:
              if line.startswith("if grep -R -n -E 'ObligationMode"):
                  skipping_old_mode_guard = True
                  output.append(
                      "grep -R -n -E 'ObligationMode\\.(STRUCTURED|FLEXIBLE)([^_A-Z]|$)' "
                      "src/main src/test > /tmp/pr15-old-modes.log || true"
                  )
                  continue
              if skipping_old_mode_guard:
                  if line == 'fi':
                      skipping_old_mode_guard = False
                  continue
              output.append(line)

          script = '\n'.join(output) + '\n'
          script = script.replace(
              'git add -A\n',
              'rm -f .github/workflows/pr15-resume-integration.yml '
              '.github/workflows/pr15-resume-v2.yml\n'
              'git add -A\n',
              1,
          )
          Path('/tmp/pr15-integrate.sh').write_text(script)
          PY

          set +e
          bash -x /tmp/pr15-integrate.sh > /tmp/pr15-resume-v2.log 2>&1
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            git merge --abort 2>/dev/null || true
            git reset --hard HEAD
            {
              echo "integration_status=$status"
              echo
              tail -n 500 /tmp/pr15-resume-v2.log
            } > docs/pr15-resume-v2-failure.txt
            git add docs/pr15-resume-v2-failure.txt
            git commit -m "chore: record PR 15 integration failure [skip ci]"
            git push origin HEAD:feat/obligation-financing-redesign
          fi
