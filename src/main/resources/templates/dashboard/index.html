<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Dashboard')}"><section><div class="mb-4"><h1 class="h2 mb-1">Operação de hoje</h1><p class="text-secondary mb-0" th:text="${#temporals.format(snapshot.date,'dd/MM/yyyy')}"></p></div><div th:if="${snapshot.currentShift.present}" class="card bg-dark text-white mb-4"><div class="card-body"><div class="text-white-50">Turno em andamento</div><div class="display-6" th:text="${snapshot.currentShift.get().duration}"></div><a class="btn btn-light mt-3" th:href="@{/shifts/{id}/revenues/new(id=${snapshot.currentShift.get().id})}">Adicionar receita</a></div></div><div th:if="${!snapshot.currentShift.present and snapshot.dayOpen}" class="card border-primary mb-4"><div class="card-body"><h2 class="h4">Dia aberto, nenhum turno ativo</h2><a class="btn btn-primary" th:href="@{/operation-days}">Iniciar próximo turno</a></div></div><div th:if="${!snapshot.dayOpen}" class="card mb-4"><div class="card-body"><h2 class="h4">Nenhum dia aberto</h2><a class="btn btn-primary" th:href="@{/operation-days/new}">Abrir dia operacional</a></div></div><div class="row g-3 mb-4"><div class="col-md-3"><div class="card card-body"><div class="text-secondary">Receita diária</div><div class="h3" th:text="${'R$ '+snapshot.dailyRevenue}"></div></div></div><div class="col-md-3"><div class="card card-body"><div class="text-secondary">Margem operacional</div><div class="h3" th:text="${'R$ '+snapshot.dailyOperatingMargin}"></div></div></div><div class="col-md-3"><div class="card card-body"><div class="text-secondary">Meta mensal pessoal</div><div class="h3" th:text="${'R$ '+snapshot.monthlyPersonalGoal}"></div></div></div><div class="col-md-3"><div class="card card-body"><div class="text-secondary">Saldo devedor</div><div class="h3" th:text="${'R$ '+snapshot.outstandingDebt}"></div></div></div></div><div class="row g-3"><div class="col-md-4"><div class="card card-body"><div class="text-secondary">Receita/hora</div><div class="h4" th:text="${'R$ '+snapshot.revenuePerHour}"></div></div></div><div class="col-md-4"><div class="card card-body"><div class="text-secondary">Receita/km</div><div class="h4" th:text="${'R$ '+snapshot.revenuePerKilometer}"></div></div></div><div class="col-md-4"><div class="card card-body"><div class="text-secondary">Necessário por dia restante</div><div class="h4" th:text="${'R$ '+snapshot.requiredPerRemainingDay}"></div></div></div></div></section></html>
