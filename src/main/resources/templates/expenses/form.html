<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Novo gasto')}">
<section>
  <div class="mb-4"><h1 class="h2 mb-1">Novo gasto</h1><p class="text-secondary mb-0">Registre o gasto e informe como ele deve ser atribuído à operação.</p></div>
  <div class="card"><div class="card-body">
    <form id="expense-form" th:action="@{/expenses}" th:object="${expenseForm}" method="post" class="row g-3">
      <div class="col-md-6"><label class="form-label" for="vehicleId">Veículo</label><select class="form-select" id="vehicleId" th:field="*{vehicleId}" required><option value="">Selecione</option><option th:each="v:${vehicles}" th:value="${v.id}" th:text="${v.name+' • '+v.plate}"></option></select><div class="invalid-feedback d-block" th:errors="*{vehicleId}"></div></div>
      <div class="col-md-6"><label class="form-label" for="categoryId">Categoria</label><select class="form-select" id="categoryId" th:field="*{categoryId}" required><option value="">Selecione</option><option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}"></option></select><div class="invalid-feedback d-block" th:errors="*{categoryId}"></div></div>
      <div class="col-md-4"><label class="form-label" for="expenseDate">Data</label><input class="form-control" id="expenseDate" type="date" th:field="*{expenseDate}" required><div class="invalid-feedback d-block" th:errors="*{expenseDate}"></div></div>
      <div class="col-md-4"><label class="form-label" for="competenceDate">Competência</label><input class="form-control" id="competenceDate" type="date" th:field="*{competenceDate}" required><div class="invalid-feedback d-block" th:errors="*{competenceDate}"></div></div>
      <div class="col-md-4"><label class="form-label" for="paidDate">Pagamento</label><input class="form-control" id="paidDate" type="date" th:field="*{paidDate}"></div>
      <div class="col-md-4"><label class="form-label" for="amount">Valor</label><input class="form-control" id="amount" type="number" step="0.01" min="0.01" th:field="*{amount}" required><div class="invalid-feedback d-block" th:errors="*{amount}"></div></div>
      <div class="col-md-4"><label class="form-label" for="classification">Classificação</label><select class="form-select" id="classification" th:field="*{classification}" required><option th:each="c:${classifications}" th:value="${c}" th:text="${c.label}"></option></select><div class="form-text">Profissional entra integralmente na operação; pessoal não entra; misto será rateado.</div></div>
      <div class="col-md-4" data-allocation-group><label class="form-label" for="allocationMethod">Método de rateio</label><select class="form-select" id="allocationMethod" th:field="*{allocationMethod}"><option value="">Selecione</option><option th:each="m:${allocationMethods}" th:value="${m}" th:text="${m.label}"></option></select></div>
      <div class="col-md-4" data-percentage-group><label class="form-label" for="professionalPercentage">Percentual profissional</label><input class="form-control" id="professionalPercentage" type="number" step="0.0001" min="0" max="1" th:field="*{professionalPercentage}"><div class="form-text">Use um valor entre 0 e 1. Exemplo: 0,75 representa 75%.</div></div>
      <div class="col-md-4" data-fixed-group><label class="form-label" for="professionalFixedAmount">Valor profissional fixo</label><input class="form-control" id="professionalFixedAmount" type="number" step="0.01" min="0" th:field="*{professionalFixedAmount}"></div>
      <div class="col-md-8" data-reason-group><label class="form-label" for="adjustmentReason">Justificativa do rateio manual</label><input class="form-control" id="adjustmentReason" th:field="*{adjustmentReason}"><div class="form-text">Obrigatória ao informar percentual ou valor profissional manualmente.</div></div>
      <div class="col-12"><label class="form-label" for="notes">Observações</label><textarea class="form-control" id="notes" rows="3" th:field="*{notes}"></textarea></div>
      <div class="col-12 d-flex gap-2"><button class="btn btn-primary" type="submit">Salvar gasto</button><a class="btn btn-outline-secondary" th:href="@{/expenses}">Cancelar</a></div>
    </form>
  </div></div>
  <script th:src="@{/js/expense-form.js}"></script>
</section>
</html>
