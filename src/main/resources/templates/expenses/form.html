<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Novo gasto')}"><section><h1 class="h2 mb-4">Novo gasto</h1><div class="card"><div class="card-body"><form th:action="@{/expenses}" th:object="${expenseForm}" method="post" class="row g-3"><div class="col-md-6"><label class="form-label">Veículo</label><select class="form-select" th:field="*{vehicleId}"><option value="">Selecione</option><option th:each="v:${vehicles}" th:value="${v.id}" th:text="${v.name+' • '+v.plate}"></option></select></div><div class="col-md-6"><label class="form-label">Categoria</label><select class="form-select" th:field="*{categoryId}"><option value="">Selecione</option><option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}"></option></select></div><div class="col-md-4"><label class="form-label">Data</label><input class="form-control" type="date" th:field="*{expenseDate}"></div><div class="col-md-4"><label class="form-label">Competência</label><input class="form-control" type="date" th:field="*{competenceDate}"></div><div class="col-md-4"><label class="form-label">Pagamento</label><input class="form-control" type="date" th:field="*{paidDate}"></div><div class="col-md-4"><label class="form-label">Valor</label><input class="form-control" type="number" step="0.01" min="0.01" th:field="*{amount}"></div><div class="col-md-4"><label class="form-label">Classificação</label><select class="form-select" th:field="*{classification}"><option th:each="c:${classifications}" th:value="${c}" th:text="${c}"></option></select></div><div class="col-md-4"><label class="form-label">Método de rateio</label><select class="form-select" th:field="*{allocationMethod}"><option value="">Não se aplica</option><option th:each="m:${allocationMethods}" th:value="${m}" th:text="${m}"></option></select></div><div class="col-md-4"><label class="form-label">Percentual profissional</label><input class="form-control" type="number" step="0.0001" min="0" max="1" th:field="*{professionalPercentage}"></div><div class="col-md-4"><label class="form-label">Valor profissional fixo</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{professionalFixedAmount}"></div><div class="col-md-4"><label class="form-label">Justificativa</label><input class="form-control" th:field="*{adjustmentReason}"></div><div class="col-12"><label class="form-label">Observações</label><textarea class="form-control" th:field="*{notes}"></textarea></div><div class="col-12 d-flex gap-2"><button class="btn btn-primary">Salvar gasto</button><a class="btn btn-outline-secondary" th:href="@{/expenses}">Cancelar</a></div></form></div></div></section></html>
