<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Gastos')}"><section><div class="d-flex justify-content-between align-items-center mb-4"><div><h1 class="h2 mb-1">Gastos</h1><p class="text-secondary mb-0">Custos profissionais, pessoais e mistos.</p></div><a class="btn btn-primary" th:href="@{/expenses/new}">Novo gasto</a></div><div class="card"><div class="table-responsive"><table class="table card-table mb-0"><thead><tr><th>Data</th><th>Veículo</th><th>Categoria</th><th>Classificação</th><th>Valor</th><th>Status</th><th></th></tr></thead><tbody><tr th:if="${#lists.isEmpty(expenses)}"><td colspan="7" class="text-center text-secondary py-5">Nenhum gasto registrado.</td></tr><tr th:each="e:${expenses}"><td th:text="${#temporals.format(e.expenseDate,'dd/MM/yyyy')}"></td><td th:text="${e.vehicle.name}"></td><td th:text="${e.category.name}"></td><td th:text="${e.classification.label}"></td><td th:text="${'R$ '+e.amount}"></td><td th:text="${e.status=='ACTIVE'?'Ativo':'Cancelado'}"></td><td class="text-end"><form th:if="${e.status=='ACTIVE'}" th:action="@{/expenses/{id}/cancel(id=${e.id})}" method="post"><button class="btn btn-sm btn-outline-danger">Cancelar</button></form></td></tr></tbody></table></div></div></section></html>
