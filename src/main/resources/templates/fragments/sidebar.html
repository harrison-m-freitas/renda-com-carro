<th:block xmlns:th="http://www.thymeleaf.org">
  <aside class="app-sidebar d-none d-md-flex flex-column bg-dark text-white p-3" th:fragment="desktopSidebar">
    <div class="mb-4">
      <div class="fw-bold">Renda com Carro</div>
      <div class="small text-white-50">Painel operacional</div>
    </div>
    <nav class="nav nav-pills flex-column gap-1" aria-label="Navegação principal">
      <a class="nav-link text-white" th:href="@{/}">Dashboard</a>
      <a class="nav-link text-white" th:href="@{/operation-days}">Dias de operação</a>
      <a class="nav-link text-white" th:href="@{/vehicles}">Veículos</a>
      <a class="nav-link text-white" th:href="@{/expenses}">Gastos</a>
      <a class="nav-link text-white" th:href="@{/mileage-closings}">Fechamentos de km</a>
      <a class="nav-link text-white" th:href="@{/fuelings}">Abastecimentos</a>
      <a class="nav-link text-white" th:href="@{/goals}">Metas</a>
      <a class="nav-link text-white" th:href="@{/obligations}">Obrigações</a>
    </nav>
  </aside>

  <div class="offcanvas offcanvas-start text-bg-dark d-md-none" tabindex="-1"
       id="appMobileNavigation" aria-labelledby="appMobileNavigationLabel"
       th:fragment="mobileSidebar">
    <div class="offcanvas-header border-bottom border-secondary">
      <div>
        <h2 class="offcanvas-title h5 mb-0" id="appMobileNavigationLabel">Renda com Carro</h2>
        <div class="small text-white-50">Painel operacional</div>
      </div>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
              aria-label="Fechar menu"></button>
    </div>
    <div class="offcanvas-body">
      <nav class="nav nav-pills flex-column gap-1" aria-label="Navegação móvel">
        <a class="nav-link text-white" th:href="@{/}" data-bs-dismiss="offcanvas">Dashboard</a>
        <a class="nav-link text-white" th:href="@{/operation-days}" data-bs-dismiss="offcanvas">Dias de operação</a>
        <a class="nav-link text-white" th:href="@{/vehicles}" data-bs-dismiss="offcanvas">Veículos</a>
        <a class="nav-link text-white" th:href="@{/expenses}" data-bs-dismiss="offcanvas">Gastos</a>
        <a class="nav-link text-white" th:href="@{/mileage-closings}" data-bs-dismiss="offcanvas">Fechamentos de km</a>
        <a class="nav-link text-white" th:href="@{/fuelings}" data-bs-dismiss="offcanvas">Abastecimentos</a>
        <a class="nav-link text-white" th:href="@{/goals}" data-bs-dismiss="offcanvas">Metas</a>
        <a class="nav-link text-white" th:href="@{/obligations}" data-bs-dismiss="offcanvas">Obrigações</a>
      </nav>
    </div>
  </div>
</th:block>
