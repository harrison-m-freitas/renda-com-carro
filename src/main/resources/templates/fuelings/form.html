<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Novo abastecimento')}"><section><h1 class="h2 mb-4">Novo abastecimento</h1><div class="card"><div class="card-body"><form th:action="@{/fuelings}" th:object="${fuelingForm}" method="post" class="row g-3"><div class="col-md-6"><label class="form-label">Veículo</label><select class="form-select" th:field="*{vehicleId}"><option value="">Selecione</option><option th:each="v:${vehicles}" th:value="${v.id}" th:text="${v.name+' • '+v.plate}"></option></select></div><div class="col-md-6"><label class="form-label">Data/hora</label><input class="form-control" type="datetime-local" th:field="*{fueledAt}"></div><div class="col-md-4"><label class="form-label">Odômetro</label><input class="form-control" type="number" step="0.1" th:field="*{odometer}"></div><div class="col-md-4"><label class="form-label">Posto</label><input class="form-control" th:field="*{station}"></div><div class="col-md-4"><label class="form-label">Combustível</label><select class="form-select" th:field="*{fuelType}"><option th:each="t:${fuelTypes}" th:value="${t}" th:text="${t.label}"></option></select></div><div class="col-md-4"><label class="form-label">Litros</label><input class="form-control" type="number" step="0.001" th:field="*{liters}"></div><div class="col-md-4"><label class="form-label">Preço por litro</label><input class="form-control" type="number" step="0.001" th:field="*{pricePerLiter}"></div><div class="col-md-4"><label class="form-label">Total</label><input class="form-control" type="number" step="0.01" th:field="*{totalAmount}"></div><div class="col-md-4 form-check ms-2"><input class="form-check-input" type="checkbox" th:field="*{fullTank}"><label class="form-check-label">Tanque cheio</label></div><div class="col-12"><label class="form-label">Observações</label><textarea class="form-control" th:field="*{notes}"></textarea></div><div class="col-12 d-flex gap-2"><button class="btn btn-primary">Salvar</button><a class="btn btn-outline-secondary" th:href="@{/fuelings}">Cancelar</a></div></form></div></div></section></html>
