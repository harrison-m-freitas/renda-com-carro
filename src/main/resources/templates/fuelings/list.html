<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Abastecimentos')}"><section><div class="d-flex justify-content-between align-items-center mb-4"><div><h1 class="h2 mb-1">Abastecimentos</h1><p class="text-secondary mb-0">Saídas de caixa e consumo entre tanques cheios.</p></div><a class="btn btn-primary" th:href="@{/fuelings/new}">Novo abastecimento</a></div><div class="card"><div class="table-responsive"><table class="table card-table mb-0"><thead><tr><th>Data</th><th>Veículo</th><th>Odômetro</th><th>Litros</th><th>Preço/L</th><th>Total</th><th>Tanque cheio</th></tr></thead><tbody><tr th:if="${#lists.isEmpty(fuelings)}"><td colspan="7" class="text-center text-secondary py-5">Nenhum abastecimento.</td></tr><tr th:each="f:${fuelings}"><td th:text="${#temporals.format(f.fueledAt,'dd/MM/yyyy HH:mm')}"></td><td th:text="${f.vehicle.name}"></td><td th:text="${f.odometer+' km'}"></td><td th:text="${f.liters+' L'}"></td><td th:text="${'R$ '+f.pricePerLiter}"></td><td th:text="${'R$ '+f.totalAmount}"></td><td th:text="${f.fullTank?'Sim':'Não'}"></td></tr></tbody></table></div></div></section></html>
