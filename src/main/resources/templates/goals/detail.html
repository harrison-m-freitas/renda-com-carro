<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Meta mensal')}"><section><div class="mb-4"><h1 class="h2 mb-1" th:text="${'Meta de '+goal.month}"></h1><p class="text-secondary mb-0">Planejamento e ritmo necessário.</p></div><div class="row g-3 mb-4"><div class="col-md-3"><div class="card card-body"><div class="text-secondary">Meta pessoal</div><div class="h3" th:text="${'R$ '+goal.personalNetGoal}"></div></div></div><div class="col-md-3"><div class="card card-body"><div class="text-secondary">Meta operacional</div><div class="h3" th:text="${'R$ '+goal.operationalGoal}"></div></div></div><div class="col-md-3"><div class="card card-body"><div class="text-secondary">Dias disponíveis</div><div class="h3" th:text="${projection.eligibleRemainingDays}"></div></div></div><div class="col-md-3"><div class="card card-body"><div class="text-secondary">Necessário por dia</div><div class="h3" th:text="${'R$ '+projection.requiredPerDay}"></div></div></div></div><div class="card"><div class="card-header"><h2 class="card-title mb-0">Dias planejados</h2></div><div class="card-body d-flex flex-wrap gap-2"><span class="badge text-bg-light" th:each="d:${plannedDays}" th:text="${#temporals.format(d.workDate,'dd/MM/yyyy')}"></span></div></div></section></html>
