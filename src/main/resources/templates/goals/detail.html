<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/app :: layout(~{::section}, 'Meta mensal')}">
<section>
  <div class="mb-4">
    <h1 class="h2 mb-1" th:text="${'Meta de ' + goal.month}"></h1>
    <p class="text-secondary mb-0">Planejamento financeiro, jornada informada e ritmo necessário.</p>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="card card-body h-100">
        <div class="text-secondary">Meta pessoal</div>
        <div class="h3" th:text="${'R$ ' + goal.personalNetGoal}"></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card card-body h-100">
        <div class="text-secondary">Meta operacional</div>
        <div class="h3" th:text="${'R$ ' + goal.operationalGoal}"></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card card-body h-100">
        <div class="text-secondary">Dias disponíveis</div>
        <div class="h3" th:text="${projection.eligibleRemainingDays}"></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card card-body h-100">
        <div class="text-secondary">Necessário por dia</div>
        <div class="h3" th:text="${'R$ ' + projection.requiredPerDay}"></div>
      </div>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-header">
      <h2 class="card-title mb-0">Jornada planejada</h2>
    </div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="text-secondary">Forma informada</div>
          <div class="h3 mb-1">
            <span th:text="${goal.enteredHours + ' h'}"></span>
            <span th:if="${goal.enteredRemainderMinutes > 0}"
                  th:text="${' ' + goal.enteredRemainderMinutes + ' min'}"></span>
          </div>
          <div class="text-secondary" th:text="${goal.workloadPeriodicity.label}"></div>
        </div>
        <div class="col-md-6">
          <div class="text-secondary">Total calculado no mês</div>
          <div class="h3 mb-1">
            <span th:text="${goal.calculatedHours + ' h'}"></span>
            <span th:if="${goal.calculatedRemainderMinutes > 0}"
                  th:text="${' ' + goal.calculatedRemainderMinutes + ' min'}"></span>
          </div>
          <div class="text-secondary"
               th:text="${plannedDays.size() + (plannedDays.size() == 1 ? ' dia planejado' : ' dias planejados')}"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 class="card-title mb-0">Distribuição por dia</h2>
    </div>
    <div class="card-body">
      <div class="table-responsive" th:if="${!plannedDays.isEmpty()}">
        <table class="table table-vcenter mb-0">
          <thead>
          <tr>
            <th>Data</th>
            <th class="text-end">Jornada</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="day : ${plannedDays}">
            <td th:text="${#temporals.format(day.workDate, 'dd/MM/yyyy')}"></td>
            <td class="text-end">
              <span th:if="${day.allocatedHours > 0}"
                    th:text="${day.allocatedHours + ' h'}"></span>
              <span th:if="${day.allocatedRemainderMinutes > 0}"
                    th:text="${(day.allocatedHours > 0 ? ' ' : '') + day.allocatedRemainderMinutes + ' min'}"></span>
              <span th:if="${day.allocatedDurationMinutes == 0}">0 min</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
      <div class="text-secondary" th:if="${plannedDays.isEmpty()}">Nenhum dia planejado.</div>
    </div>
  </div>
</section>
</html>
