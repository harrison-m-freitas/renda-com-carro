<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Nova meta')}"><section><h1 class="h2 mb-4">Nova meta mensal</h1><div class="card"><div class="card-body"><form th:action="@{/goals}" th:object="${goalForm}" method="post" class="row g-3"><div class="col-md-4"><label class="form-label">Mês</label><input class="form-control" type="month" th:field="*{month}"></div><div class="col-md-4"><label class="form-label">Meta líquida pessoal</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{personalNetGoal}"></div><div class="col-md-4"><label class="form-label">Meta operacional</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{operationalGoal}"></div><div class="col-md-4"><label class="form-label">Horas planejadas</label><input class="form-control" type="number" step="0.25" min="0" th:field="*{plannedHours}"></div><div class="col-12"><label class="form-label">Dias planejados</label><textarea class="form-control" rows="4" th:field="*{plannedDates}" placeholder="2026-07-01, 2026-07-02, 2026-07-04"></textarea><div class="form-text">Separe as datas por vírgula. Domingos não são aceitos.</div><div class="text-danger small" th:errors="*{plannedDates}"></div></div><div class="col-12 d-flex gap-2"><button class="btn btn-primary">Salvar meta</button><a class="btn btn-outline-secondary" th:href="@{/}">Cancelar</a></div></form></div></div></section></html>
