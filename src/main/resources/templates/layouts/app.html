<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, pageTitle)">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="bg-body-tertiary">
<div class="app-shell d-flex min-vh-100">
  <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>
  <div class="flex-grow-1 min-w-0">
    <header class="app-mobile-header d-md-none bg-dark text-white">
      <button class="btn btn-dark app-mobile-menu-button" type="button"
              data-bs-toggle="offcanvas" data-bs-target="#app-mobile-navigation"
              aria-controls="app-mobile-navigation" aria-label="Abrir menu principal">
        <span aria-hidden="true">☰</span>
      </button>
      <div>
        <div class="fw-semibold">Renda com Carro</div>
        <div class="small text-white-50">Painel operacional</div>
      </div>
    </header>
    <main class="app-content py-4">
      <div class="container-xl">
        <div th:replace="~{fragments/flash :: flash}"></div>
        <th:block th:replace="${content}"></th:block>
      </div>
    </main>
  </div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.7/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
