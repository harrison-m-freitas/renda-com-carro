<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, pageTitle)"
      th:attr="data-saved-time-zone=${savedTimeZoneId == null ? '' : savedTimeZoneId},
               data-default-time-zone=${defaultTimeZoneId},
               data-active-time-zone=${activeTimeZoneId}">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="bg-body-tertiary">
<header class="app-mobile-header d-md-none sticky-top bg-dark text-white">
  <div class="container-fluid d-flex align-items-center gap-3 py-2 px-3">
    <button class="btn btn-sm btn-outline-light app-mobile-menu-button" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#appMobileNavigation"
            aria-controls="appMobileNavigation" aria-label="Abrir menu principal">
      <span class="app-mobile-menu-icon" aria-hidden="true"></span>
    </button>
    <div class="min-w-0">
      <div class="fw-semibold text-truncate">Renda com Carro</div>
      <div class="small text-white-50 text-truncate" th:text="${pageTitle}"></div>
    </div>
  </div>
</header>
<div th:replace="~{fragments/sidebar :: mobileSidebar}"></div>
<div class="container-xl pt-3" data-time-zone-banner hidden>
  <div class="alert alert-warning time-zone-banner mb-0" role="region"
       aria-labelledby="time-zone-banner-title">
    <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
      <div>
        <h2 class="h5 mb-1" id="time-zone-banner-title">Fuso horário diferente detectado</h2>
        <p class="mb-0">
          Este dispositivo está usando <strong data-detected-time-zone></strong>, mas sua conta está
          configurada como <strong data-saved-time-zone></strong>.
        </p>
      </div>
      <div class="d-flex flex-column flex-sm-row gap-2 flex-shrink-0">
        <button class="btn btn-warning" type="button" data-use-device-time-zone>
          Usar fuso deste dispositivo
        </button>
        <button class="btn btn-outline-secondary" type="button" data-keep-saved-time-zone>
          Manter fuso configurado
        </button>
      </div>
    </div>
  </div>
</div>
<div class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"
     data-time-zone-status></div>
<div class="app-shell d-flex min-vh-100">
  <aside th:replace="~{fragments/sidebar :: desktopSidebar}"></aside>
  <div class="flex-grow-1 min-w-0">
    <main class="app-content py-4">
      <div class="container-xl">
        <div th:replace="~{fragments/flash :: flash}"></div>
        <th:block th:replace="${content}"></th:block>
      </div>
    </main>
  </div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.7/js/bootstrap.bundle.min.js}"></script>
<script type="module" th:src="@{/js/user-time-zone.js}"></script>
</body>
</html>
