<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · Renda com Carro</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.7/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-body-tertiary">
<div class="min-vh-100 d-flex align-items-center py-4">
  <div class="container" style="max-width: 28rem">
    <form class="card shadow-sm" th:action="@{/login}" method="post">
      <div class="card-body p-4">
        <h1 class="h3 text-center mb-4">Renda com Carro</h1>
        <div class="mb-3">
          <label class="form-label" for="username">Usuário</label>
          <input class="form-control" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Senha</label>
          <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div th:if="${param.error}" class="alert alert-danger">Credenciais inválidas.</div>
        <div th:if="${param.logout}" class="alert alert-success">Sessão encerrada.</div>
        <button class="btn btn-primary btn-touch w-100" type="submit">Entrar</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
