<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · Renda com Carro</title>
  <link rel="stylesheet" th:href="@{/vendor/tabler/tabler.min.css}">
</head>
<body class="d-flex flex-column">
<div class="page page-center">
  <div class="container container-tight py-4">
    <form class="card card-md" th:action="@{/login}" method="post">
      <div class="card-body">
        <h2 class="h2 text-center mb-4">Renda com Carro</h2>
        <div class="mb-3">
          <label class="form-label" for="username">Usuário</label>
          <input class="form-control" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Senha</label>
          <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div th:if="${param.error}" class="alert alert-danger">Credenciais inválidas.</div>
        <div th:if="${param.logout}" class="alert alert-success">Sessão encerrada.</div>
        <button class="btn btn-primary w-100" type="submit">Entrar</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
