<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Obrigação')}"><section><div class="d-flex justify-content-between mb-4"><div><h1 class="h2" th:text="${obligation.creditor}"></h1><div th:text="${obligation.mode}"></div></div><a class="btn btn-primary" th:href="@{/obligations/{id}/payments/new(id=${obligation.id})}">Registrar pagamento</a></div><div class="card card-body mb-4"><div class="text-secondary">Saldo atual</div><div class="display-6" th:text="${'R$ '+obligation.currentBalance}"></div></div><div class="card mb-4"><div class="card-header">Cronograma</div><table class="table mb-0"><tr th:each="i:${schedule}"><td th:text="${#temporals.format(i.dueDate,'dd/MM/yyyy')}"></td><td th:text="${'R$ '+i.expectedAmount}"></td><td th:text="${i.status}"></td></tr></table></div><div class="card"><div class="card-header">Pagamentos</div><table class="table mb-0"><tr th:each="p:${payments}"><td th:text="${p.id}"></td><td th:text="${'R$ '+p.amount}"></td></tr></table></div></section></html>
