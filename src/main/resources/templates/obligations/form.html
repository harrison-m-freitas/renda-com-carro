<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Nova obrigação')}"><section><h1 class="h2 mb-4">Nova obrigação</h1><div class="card card-body"><form th:action="@{/obligations}" th:object="${obligationForm}" method="post" class="row g-3"><div class="col-md-6"><label class="form-label">Veículo</label><select class="form-select" th:field="*{vehicleId}"><option value="">Sem vínculo</option><option th:each="v:${vehicles}" th:value="${v.id}" th:text="${v.name}"></option></select></div><div class="col-md-6"><label class="form-label">Credor</label><input class="form-control" th:field="*{creditor}"></div><div class="col-md-4"><label class="form-label">Tipo</label><select class="form-select" th:field="*{type}"><option th:each="t:${types}" th:value="${t}" th:text="${t}"></option></select></div><div class="col-md-4"><label class="form-label">Modo</label><select class="form-select" th:field="*{mode}"><option th:each="m:${modes}" th:value="${m}" th:text="${m}"></option></select></div><div class="col-md-4"><label class="form-label">Principal</label><input class="form-control" type="number" step="0.01" th:field="*{principal}"></div><div class="col-md-3"><label class="form-label">Juros anuais</label><input class="form-control" type="number" step="0.000001" th:field="*{annualRate}"></div><div class="col-md-3"><label class="form-label">Início</label><input class="form-control" type="date" th:field="*{startDate}"></div><div class="col-md-3"><label class="form-label">Primeiro vencimento</label><input class="form-control" type="date" th:field="*{firstDueDate}"></div><div class="col-md-3"><label class="form-label">Parcelas</label><input class="form-control" type="number" th:field="*{termMonths}"></div><div class="col-md-4"><label class="form-label">Parcela prevista</label><input class="form-control" type="number" step="0.01" th:field="*{plannedInstallment}"></div><div class="col-md-4"><label class="form-label">Meta mensal flexível</label><input class="form-control" type="number" step="0.01" th:field="*{monthlyTarget}"></div><div class="col-12"><label class="form-label">Notas</label><textarea class="form-control" th:field="*{notes}"></textarea></div><div class="col-12"><button class="btn btn-primary">Salvar</button></div></form></div></section></html>
