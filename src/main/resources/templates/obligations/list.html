<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/app :: layout(~{::section}, 'Obrigações')}">
<section th:attr="data-obligation-active-draft-key=${#lists.isEmpty(obligationDrafts) ? '' : obligationDrafts[0].contextKey}">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 mb-0">Obrigações</h1>
    <a class="btn btn-primary" th:href="@{/obligations/new}">Nova obrigação</a>
  </div>

  <section class="card mb-4" th:if="${!#lists.isEmpty(obligationDrafts)}"
           aria-labelledby="obligation-drafts-title">
    <div class="card-header">
      <div>
        <h2 class="h5 mb-1" id="obligation-drafts-title">Obrigação em andamento</h2>
        <p class="text-secondary small mb-0">Existe somente um rascunho ativo por vez.</p>
      </div>
    </div>
    <div class="list-group list-group-flush">
      <div class="list-group-item d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3"
           th:with="draft=${obligationDrafts[0]}">
        <span>
          <strong class="d-block" th:text="${draft.creditor}">Credor</strong>
          <small class="text-secondary">
            Etapa <span th:text="${draft.currentStep}"></span> ·
            salva em <span th:text="${#temporals.format(draft.updatedAt, 'dd/MM/yyyy HH:mm')}"></span>
          </small>
        </span>
        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-sm btn-outline-primary"
             th:href="@{/obligations/new(draftKey=${draft.contextKey})}">
            Continuar
          </a>
          <form th:action="@{/obligations/draft/discard}" method="post"
                data-obligation-draft-discard
                th:attr="data-draft-key=${draft.contextKey}"
                onsubmit="return confirm('Descartar esta obrigação em andamento?');">
            <input type="hidden" name="next" value="list">
            <button class="btn btn-sm btn-outline-danger" type="submit">Descartar</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div class="card">
    <div class="table-responsive">
      <table class="table card-table mb-0">
        <thead><tr><th>Credor</th><th>Tipo</th><th>Modo</th><th>Saldo</th><th>Status</th></tr></thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(obligations)}">
            <td colspan="5" class="text-center py-5">Nenhuma obrigação.</td>
          </tr>
          <tr th:each="obligation : ${obligations}">
            <td><a th:href="@{/obligations/{id}(id=${obligation.id})}" th:text="${obligation.creditor}"></a></td>
            <td th:text="${obligation.type.label}"></td>
            <td th:text="${obligation.mode.label}"></td>
            <td th:text="${'R$ ' + obligation.currentBalance}"></td>
            <td th:text="${obligation.status.label}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module" th:src="@{/js/obligation-draft-actions.js}"></script>
</section>
</html>
