<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Obrigações')}"><section><div class="d-flex justify-content-between mb-4"><h1 class="h2">Obrigações</h1><a class="btn btn-primary" th:href="@{/obligations/new}">Nova obrigação</a></div><div class="card"><div class="table-responsive"><table class="table card-table mb-0"><thead><tr><th>Credor</th><th>Tipo</th><th>Modo</th><th>Saldo</th><th>Status</th></tr></thead><tbody><tr th:if="${#lists.isEmpty(obligations)}"><td colspan="5" class="text-center py-5">Nenhuma obrigação.</td></tr><tr th:each="o:${obligations}"><td><a th:href="@{/obligations/{id}(id=${o.id})}" th:text="${o.creditor}"></a></td><td th:text="${o.type.label}"></td><td th:text="${o.mode.label}"></td><td th:text="${'R$ '+o.currentBalance}"></td><td th:text="${o.status.label}"></td></tr></tbody></table></div></div></section></html>
