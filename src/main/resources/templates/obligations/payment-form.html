<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Pagamento')}"><section><h1 class="h2 mb-4">Pagamento para <span th:text="${obligation.creditor}"></span></h1><form class="card card-body row g-3" th:action="@{/obligations/{id}/payments(id=${obligation.id})}" th:object="${paymentForm}" method="post"><div class="col-md-3"><label>Data</label><input class="form-control" type="date" th:field="*{date}"></div><div class="col-md-3"><label>Principal</label><input class="form-control" type="number" step="0.01" th:field="*{principal}"></div><div class="col-md-3"><label>Juros</label><input class="form-control" type="number" step="0.01" th:field="*{interest}"></div><div class="col-md-3"><label>Amortização extra</label><input class="form-control" type="number" step="0.01" th:field="*{extra}"></div><div class="col-md-6"><label>Referência</label><input class="form-control" th:field="*{externalReference}"></div><div class="col-12"><label>Notas</label><textarea class="form-control" th:field="*{notes}"></textarea></div><div class="col-12"><button class="btn btn-primary">Registrar</button></div></form></section></html>
