<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Dia operacional')}"><section><div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4"><div><h1 class="h2 mb-1" th:text="${'Operação de '+#temporals.format(day.date,'dd/MM/yyyy')}"></h1><p class="text-secondary mb-0" th:text="${day.vehicle.name+' • '+day.vehicle.plate}"></p></div><a th:if="${day.status.name()=='IN_PROGRESS'}" class="btn btn-primary btn-touch" th:href="@{/operation-days/{id}/shifts/new(id=${day.id})}">Iniciar turno</a></div><div class="row g-3 mb-4"><div class="col-md-4"><div class="card card-body"><div class="text-secondary">Meta</div><div class="h3 mb-0" th:text="${'R$ '+day.plannedGoal}"></div></div></div><div class="col-md-4"><div class="card card-body"><div class="text-secondary">Odômetro inicial</div><div class="h3 mb-0" th:text="${day.initialOdometer+' km'}"></div></div></div><div class="col-md-4"><div class="card card-body"><div class="text-secondary">Status</div><div class="h3 mb-0" th:text="${day.status.label}"></div></div></div></div><div class="card mb-4"><div class="card-header"><h2 class="card-title mb-0">Turnos</h2></div><div class="table-responsive"><table class="table card-table mb-0"><thead><tr><th>Início</th><th>Região</th><th>Plataformas</th><th>Distância</th><th>Status</th><th></th></tr></thead><tbody><tr th:if="${#lists.isEmpty(shifts)}"><td colspan="6" class="text-center text-secondary py-4">Nenhum turno.</td></tr><tr th:each="shift:${shifts}"><td th:text="${#temporals.format(shift.startedAt,'HH:mm')}"></td><td th:text="${shift.startRegion}"></td><td><span th:each="p:${shift.platforms}" class="badge text-bg-light me-1" th:text="${p.name}"></span></td><td th:text="${shift.finalOdometer==null?'—':shift.distance+' km'}"></td><td th:text="${shift.status.label}"></td><td class="text-end"><a th:if="${shift.status.name()=='OPEN'}" class="btn btn-sm btn-danger" th:href="@{/shifts/{id}/close(id=${shift.id})}">Encerrar</a></td></tr></tbody></table></div></div><div th:if="${day.status.name()=='IN_PROGRESS'}" class="card"><div class="card-body"><form class="row g-3 align-items-end" th:action="@{/operation-days/{id}/close(id=${day.id})}" method="post"><div class="col-md-5"><label class="form-label">Odômetro final do dia</label><input class="form-control" name="finalOdometer" type="number" step="0.1" required></div><div class="col-md-auto"><button class="btn btn-success" type="submit">Fechar dia</button></div></form><form class="mt-3" th:action="@{/operation-days/{id}/cancel(id=${day.id})}" method="post"><button class="btn btn-outline-danger btn-sm" type="submit">Cancelar dia</button></form></div></div></section></html>
