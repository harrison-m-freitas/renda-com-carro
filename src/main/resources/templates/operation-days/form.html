<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Abrir dia')}"><section><div class="mb-4"><h1 class="h2">Abrir dia operacional</h1><p class="text-secondary">Defina o veículo, meta e odômetro inicial.</p></div><form class="card" th:action="@{/operation-days}" th:object="${operationalDayForm}" method="post"><div class="card-body"><div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="err:${#fields.globalErrors()}" th:text="${err}"></div><div class="row g-3"><div class="col-md-4"><label class="form-label">Data</label><input class="form-control" type="date" th:field="*{date}"><div class="text-danger small" th:errors="*{date}"></div></div><div class="col-md-8"><label class="form-label">Veículo</label><select class="form-select" th:field="*{vehicleId}"><option value="">Selecione</option><option th:each="v:${vehicles}" th:value="${v.id}" th:text="${v.name+' — '+v.plate}"></option></select></div><div class="col-md-6"><label class="form-label">Meta do dia</label><input class="form-control" type="number" step="0.01" inputmode="decimal" th:field="*{plannedGoal}"></div><div class="col-md-6"><label class="form-label">Odômetro inicial</label><input class="form-control" type="number" step="0.1" inputmode="decimal" th:field="*{initialOdometer}"></div></div></div><div class="card-footer d-flex justify-content-end gap-2"><a class="btn btn-outline-secondary" th:href="@{/operation-days}">Cancelar</a><button class="btn btn-primary btn-touch" type="submit">Abrir dia</button></div></form></section></html>
