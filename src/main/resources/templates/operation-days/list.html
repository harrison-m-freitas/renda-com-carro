<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Dias de operação')}"><section><div class="d-flex justify-content-between align-items-center mb-4"><div><h1 class="h2 mb-1">Dias de operação</h1><p class="text-secondary mb-0">Planejamento, turnos e fechamento diário.</p></div><a class="btn btn-primary btn-touch" th:href="@{/operation-days/new}">Abrir dia</a></div><div class="card"><div class="table-responsive"><table class="table card-table mb-0"><thead><tr><th>Data</th><th>Veículo</th><th>Meta</th><th>Status</th><th></th></tr></thead><tbody><tr th:if="${#lists.isEmpty(days)}"><td colspan="5" class="text-center text-secondary py-5">Nenhum dia registrado.</td></tr><tr th:each="day:${days}"><td th:text="${#temporals.format(day.date,'dd/MM/yyyy')}"></td><td th:text="${day.vehicle.name}"></td><td th:text="${'R$ '+day.plannedGoal}"></td><td><span class="badge text-bg-secondary" th:text="${day.status}"></span></td><td class="text-end"><a class="btn btn-sm btn-outline-primary" th:href="@{/operation-days/{id}(id=${day.id})}">Abrir</a></td></tr></tbody></table></div></div></section></html>
