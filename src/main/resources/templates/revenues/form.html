<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Registrar receita')}">
<section>
  <div class="mb-4"><h1 class="h2 mb-1">Registrar receita</h1><p class="text-secondary mb-0">Lançamento rápido por turno e plataforma.</p></div>
  <div class="card"><div class="card-body">
    <form th:action="@{/shifts/{id}/revenues(id=${shift.id})}" th:object="${revenueForm}" method="post" class="row g-3">
      <div class="col-md-4"><label class="form-label">Plataforma</label><select class="form-select" th:field="*{platformId}"><option value="">Selecione</option><option th:each="p : ${platforms}" th:value="${p.id}" th:text="${p.name}"></option></select></div>
      <div class="col-md-4"><label class="form-label">Tipo</label><select class="form-select" th:field="*{type}"><option th:each="t : ${revenueTypes}" th:value="${t}" th:text="${t.label}"></option></select></div>
      <div class="col-md-4"><label class="form-label">Origem</label><select class="form-select" th:field="*{source}"><option th:each="s : ${sources}" th:value="${s}" th:text="${s.label}"></option></select></div>
      <div class="col-md-4"><label class="form-label">Competência</label><input class="form-control" type="date" th:field="*{competenceDate}"></div>
      <div class="col-md-4"><label class="form-label">Recebimento</label><input class="form-control" type="date" th:field="*{receivedDate}"></div>
      <div class="col-md-4"><label class="form-label">Líquido</label><input class="form-control" type="number" step="0.01" min="0.01" th:field="*{netAmount}"></div>
      <div class="col-md-3"><label class="form-label">Bruto</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{grossAmount}"></div>
      <div class="col-md-3"><label class="form-label">Taxa</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{platformFee}"></div>
      <div class="col-md-3"><label class="form-label">Gorjeta</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{tipAmount}"></div>
      <div class="col-md-3"><label class="form-label">Bônus</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{bonusAmount}"></div>
      <div class="col-12"><label class="form-label">Referência externa</label><input class="form-control" th:field="*{externalReference}"></div>
      <div class="col-12 d-flex gap-2"><button class="btn btn-primary" type="submit">Salvar receita</button><a class="btn btn-outline-secondary" th:href="@{/operation-days/{id}(id=${shift.operationalDay.id})}">Cancelar</a></div>
    </form>
  </div></div>
</section>
</html>
