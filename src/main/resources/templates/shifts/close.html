<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Encerrar turno')}"><section><h1 class="h2">Encerrar turno</h1><p class="text-secondary" th:text="${'Iniciado às '+#temporals.format(shift.startedAt,'HH:mm')+' em '+shift.startRegion}"></p><form class="card" th:action="@{/shifts/{id}/close(id=${shift.id})}" th:object="${closeShiftForm}" method="post"><div class="card-body"><div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="err:${#fields.globalErrors()}" th:text="${err}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">Fim</label><input class="form-control" type="datetime-local" th:field="*{endedAt}"></div><div class="col-md-6"><label class="form-label">Odômetro final</label><input class="form-control" type="number" step="0.1" th:field="*{finalOdometer}"></div><div class="col-12"><label class="form-label">Região final</label><input class="form-control" th:field="*{endRegion}"></div><div class="col-12"><label class="form-label">Bairros atendidos</label><textarea class="form-control" rows="3" placeholder="Separe por vírgulas ou linhas" th:field="*{neighborhoodsText}"></textarea></div></div></div><div class="card-footer d-flex justify-content-end gap-2"><a class="btn btn-outline-secondary" th:href="@{/operation-days/{id}(id=${shift.operationalDay.id})}">Voltar</a><button class="btn btn-danger btn-touch" type="submit">Encerrar turno</button></div></form></section></html>
