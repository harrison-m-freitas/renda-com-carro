<!doctype html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Iniciar turno')}"><section><h1 class="h2">Iniciar turno</h1><p class="text-secondary" th:text="${'Dia '+#temporals.format(day.date,'dd/MM/yyyy')}"></p><form class="card" th:action="@{/operation-days/{id}/shifts(id=${day.id})}" th:object="${openShiftForm}" method="post"><div class="card-body"><div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="err:${#fields.globalErrors()}" th:text="${err}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">Início</label><input class="form-control" type="datetime-local" th:field="*{startedAt}"></div><div class="col-md-6"><label class="form-label">Odômetro inicial</label><input class="form-control" type="number" step="0.1" th:field="*{initialOdometer}"></div><div class="col-12"><label class="form-label">Região inicial</label><input class="form-control" th:field="*{startRegion}"></div><div class="col-12"><label class="form-label d-block">Plataformas</label><div class="form-check form-check-inline" th:each="p:${platforms}"><input class="form-check-input" type="checkbox" th:field="*{platformIds}" th:value="${p.id}"><label class="form-check-label" th:text="${p.name}"></label></div></div></div></div><div class="card-footer d-flex justify-content-end gap-2"><a class="btn btn-outline-secondary" th:href="@{/operation-days/{id}(id=${day.id})}">Cancelar</a><button class="btn btn-primary btn-touch" type="submit">Iniciar turno</button></div></form></section></html>
