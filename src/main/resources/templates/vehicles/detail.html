<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Detalhes do veículo')}">
<section class="form-page vehicle-list-page">

  <a class="vehicle-form-back text-decoration-none d-inline-flex align-items-center gap-2 mb-3" th:href="@{/vehicles}">
    <span>‹</span><span>Veículos</span>
  </a>

  <div class="vehicle-detail-head">
    <div class="d-flex align-items-center gap-3">
      <div class="vehicle-card__glyph"
           th:text="${vehicle.model != null and vehicle.model.length() >= 2 ? vehicle.model.substring(0,2).toUpperCase() : vehicle.make.substring(0,2).toUpperCase()}">HB</div>
      <div>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
          <h1 class="h2 mb-0" th:text="${vehicle.name}">Honda HB20</h1>
          <span th:if="${vehicle.primaryVehicle}" class="vehicle-status-pill vehicle-status-pill--active">
            <span class="vehicle-status-pill__dot"></span>Principal
          </span>
          <span class="vehicle-status-pill vehicle-status-pill--active" th:if="${!vehicle.primaryVehicle and vehicle.status.name() == 'ACTIVE'}">
            <span class="vehicle-status-pill__dot"></span>Em operação
          </span>
          <span class="vehicle-status-pill vehicle-status-pill--inactive" th:if="${vehicle.status.name() != 'ACTIVE'}" th:text="${vehicle.status.label}">Inativo</span>
        </div>
        <p class="text-secondary mb-0" style="margin-top:.15rem" th:text="${vehicle.make + ' · ' + vehicle.model + ' · ' + vehicle.year}"></p>
      </div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" th:href="@{/vehicles/{id}/edit(id=${vehicle.id})}">Editar</a>
      <form th:if="${vehicle.status.name() == 'ACTIVE' and !vehicle.primaryVehicle}" th:action="@{/vehicles/{id}/activate(id=${vehicle.id})}" method="post" style="display:contents">
        <button class="btn btn-primary" type="submit">Tornar principal</button>
      </form>
    </div>
  </div>

  <div class="vehicle-stat-grid">
    <div class="vehicle-stat-card">
      <span class="vehicle-stat-card__label">Placa</span>
      <strong class="vehicle-stat-card__value" th:text="${vehicle.plate}">CDE2345</strong>
    </div>
    <div class="vehicle-stat-card">
      <span class="vehicle-stat-card__label">Odômetro atual</span>
      <strong class="vehicle-stat-card__value" th:text="${vehicle.currentOdometer + ' km'}">45.230 km</strong>
    </div>
    <div class="vehicle-stat-card">
      <span class="vehicle-stat-card__label">Odômetro inicial</span>
      <strong class="vehicle-stat-card__value" th:text="${vehicle.initialOdometer + ' km'}">0 km</strong>
    </div>
    <div class="vehicle-stat-card">
      <span class="vehicle-stat-card__label">Preço de compra</span>
      <strong class="vehicle-stat-card__value"
              th:text="${vehicle.purchasePrice == null ? 'Não informado' : 'R$ ' + #numbers.formatDecimal(vehicle.purchasePrice, 1, 2)}">Não informado</strong>
    </div>
  </div>

  <div class="vehicle-detail-card">
    <h2 class="vehicle-detail-card__title">Dados do veículo</h2>
    <dl class="vehicle-detail-dl">
      <div><dt>Combustível</dt><dd th:text="${vehicle.fuelType.label}">Flex</dd></div>
      <div><dt>Status</dt><dd th:text="${vehicle.status.label}">Em operação</dd></div>
    </dl>
  </div>

  <div class="vehicle-detail-footer">
    <a class="btn btn-outline-secondary" th:href="@{/vehicles}">Voltar</a>
    <form th:if="${vehicle.status.name() == 'ACTIVE' and !vehicle.primaryVehicle}"
          th:action="@{/vehicles/{id}/archive(id=${vehicle.id})}" method="post"
          onsubmit="return confirm('Arquivar este veículo?')" style="display:contents">
      <button class="btn btn-outline-danger" type="submit">Arquivar veículo</button>
    </form>
  </div>

</section>
</html>
