<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/app :: layout(~{::section}, ${editing ? 'Editar veículo' : 'Novo veículo'})}">
<section>
  <div class="mb-4">
    <h1 class="h2 mb-1" th:text="${editing ? 'Editar veículo' : 'Cadastrar veículo'}"></h1>
    <p class="text-secondary mb-0">Dados básicos do veículo usado na operação.</p>
  </div>

  <form class="card" th:object="${vehicleForm}"
        th:action="${editing} ? @{/vehicles/{id}(id=${vehicle.id})} : @{/vehicles}" method="post">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label" for="name">Nome de identificação</label>
          <input class="form-control" id="name" th:field="*{name}" required>
          <div class="invalid-feedback d-block" th:errors="*{name}"></div>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label" for="make">Marca</label>
          <input class="form-control" id="make" th:field="*{make}" required>
          <div class="invalid-feedback d-block" th:errors="*{make}"></div>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label" for="model">Modelo</label>
          <input class="form-control" id="model" th:field="*{model}" required>
          <div class="invalid-feedback d-block" th:errors="*{model}"></div>
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label" for="year">Ano</label>
          <input class="form-control" id="year" th:field="*{year}" type="number" min="1980" max="2100" required>
          <div class="invalid-feedback d-block" th:errors="*{year}"></div>
        </div>
        <div class="col-6 col-md-3">
          <label class="form-label" for="plate">Placa</label>
          <input class="form-control text-uppercase" id="plate" th:field="*{plate}" maxlength="7" required>
          <div class="invalid-feedback d-block" th:errors="*{plate}"></div>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label" for="fuelType">Combustível</label>
          <select class="form-select" id="fuelType" th:field="*{fuelType}" required>
            <option value="">Selecione</option>
            <option th:each="type : ${fuelTypes}" th:value="${type}" th:text="${type.label}"></option>
          </select>
          <div class="invalid-feedback d-block" th:errors="*{fuelType}"></div>
        </div>
        <div class="col-12 col-md-2">
          <label class="form-label" for="initialOdometer" th:text="${editing ? 'Odômetro atual' : 'Odômetro inicial'}"></label>
          <input class="form-control" id="initialOdometer" th:field="*{initialOdometer}" type="number" min="0" step="0.1" required>
          <div class="invalid-feedback d-block" th:errors="*{initialOdometer}"></div>
        </div>
        <div class="col-12 col-md-2">
          <label class="form-label" for="purchasePrice">Preço de compra</label>
          <input class="form-control" id="purchasePrice" th:field="*{purchasePrice}" type="number" min="0" step="0.01" required>
          <div class="invalid-feedback d-block" th:errors="*{purchasePrice}"></div>
        </div>
      </div>
    </div>
    <div class="card-footer d-flex justify-content-end gap-2">
      <a class="btn btn-outline-secondary" th:href="@{/vehicles}">Cancelar</a>
      <button class="btn btn-primary" type="submit">Salvar veículo</button>
    </div>
  </form>
</section>
</html>
