<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/app :: layout(~{::section}, 'Veículos')}">
<section class="form-page vehicle-list-page">

  <div class="vehicle-list-head">
    <div>
      <h1 class="h2 mb-1">Veículos</h1>
      <p class="text-secondary mb-0">Histórico e veículo principal da operação.</p>
    </div>
    <a class="btn btn-primary btn-touch" th:href="@{/vehicles/new}">+ Cadastrar veículo</a>
  </div>

  <div class="vehicle-list-empty" th:if="${#lists.isEmpty(vehicles)}">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    <p>Nenhum veículo cadastrado ainda.</p>
    <a class="btn btn-primary" th:href="@{/vehicles/new}">Cadastrar primeiro veículo</a>
  </div>

  <div class="vehicle-cards" th:if="${!#lists.isEmpty(vehicles)}">
    <div class="vehicle-card" th:each="vehicle : ${vehicles}">
      <div class="vehicle-card__glyph" aria-hidden="true"
           th:text="${vehicle.model != null and vehicle.model.length() >= 2 ? vehicle.model.substring(0,2).toUpperCase() : vehicle.make.substring(0,2).toUpperCase()}">HB</div>

      <div class="vehicle-card__body">
        <div class="vehicle-card__top">
          <a class="vehicle-card__name" th:href="@{/vehicles/{id}(id=${vehicle.id})}" th:text="${vehicle.name}">Honda HB20</a>
          <span th:if="${vehicle.primaryVehicle}" class="vehicle-status-pill vehicle-status-pill--active">
            <span class="vehicle-status-pill__dot"></span>Principal
          </span>
          <span class="vehicle-status-pill vehicle-status-pill--active" th:if="${!vehicle.primaryVehicle and vehicle.status.name() == 'ACTIVE'}">
            <span class="vehicle-status-pill__dot"></span>Em operação
          </span>
          <span class="vehicle-status-pill vehicle-status-pill--inactive" th:if="${vehicle.status.name() != 'ACTIVE'}" th:text="${vehicle.status.label}">Inativo</span>
        </div>
        <div class="vehicle-card__meta">
          <span th:text="${vehicle.make + ' ' + vehicle.model}">Honda HB20</span>
          <span class="vehicle-card__sep" aria-hidden="true">·</span>
          <span th:text="${vehicle.year}">2020</span>
          <span class="vehicle-card__sep" aria-hidden="true">·</span>
          <span th:text="${vehicle.plate}">CDE2345</span>
          <span class="vehicle-card__sep" aria-hidden="true">·</span>
          <span th:text="${vehicle.currentOdometer + ' km'}">45.230 km</span>
        </div>
      </div>

      <div class="vehicle-card__actions">
        <a class="btn btn-sm btn-outline-secondary" th:href="@{/vehicles/{id}/edit(id=${vehicle.id})}">Editar</a>
        <form th:if="${vehicle.status.name() == 'ACTIVE' and !vehicle.primaryVehicle}" th:action="@{/vehicles/{id}/activate(id=${vehicle.id})}" method="post" style="display:contents">
          <button class="btn btn-sm btn-outline-primary" type="submit">Tornar principal</button>
        </form>
      </div>
    </div>
  </div>

</section>
</html>
